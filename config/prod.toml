[pipeline]
environment = "prod"

[kafka]
topic = "control-topic"
value_schema_file = "samples/control_message.avsc"

# Production transport mirrors the reference consumer: SASL_SSL + GSSAPI behind a
# load balancer (hostname verification disabled), keytab-based Kerberos login.
[kafka.client]
"bootstrap.servers" = "prod-kafka-1:9092,prod-kafka-2:9092,prod-kafka-3:9092"
"client.id" = "etl-control-prod"
"security.protocol" = "SASL_SSL"
"sasl.mechanism" = "GSSAPI"
"sasl.kerberos.service.name" = "kafka"
"sasl.kerberos.principal" = "your_principal@PROD.REALM"
"sasl.kerberos.keytab" = "/path/to/your_principal.keytab"
"ssl.ca.location" = "/path/to/complete_truststore.pem"
"ssl.endpoint.identification.algorithm" = "none"

[kafka.consumer]
"group.id" = "etl-prod"
"auto.offset.reset" = "latest"
"enable.auto.commit" = true

[schema_registry]
"url" = "https://prod-schema-registry:1443"
"ssl.ca.location" = "/path/to/complete_truststore.pem"

[consumer]
output_dir = "data/converted"
trigger_next = true
next_command = ["python", "-m", "etl.es_lookup"]
max_messages = 100
poll_timeout_seconds = 10.0

[message]
# id_attribute is a dotted path; header.batchId is promoted to id_value and used
# as the Elasticsearch term-query field by etl.es_lookup.
id_attribute = "header.batchId"
# Save-gate: only persist a message when this dotted-path field equals status_value.
status_field = "control.batch.processStatus"
status_value = "End"

[elasticsearch]
hosts = ["https://prod-es:9200"]
index = "source-index-prod"
# Field the id value is matched against in a term query. Defaults to id_attribute
# (header.batchId) when unset, which is correct when batchId is mapped as keyword.
# If batchId is mapped as `text` with a keyword subfield, the term query must
# target the subfield or it will match 0 records due to analysis/tokenization:
term_field = "header.batchId.keyword"
request_timeout_seconds = 30
verify_certs = true
username = ""
password = ""
api_key = ""
# A batch can match thousands of records, so es_lookup scrolls through every
# hit and writes them as JSON-lines to output_dir/<index>-<id_value>.jsonl
# instead of printing them. Tune scroll_size/scroll_timeout for large batches.
output_dir = "data/es_results"
scroll_size = 1000
scroll_timeout = "2m"

# ---------------------------------------------------------------------------
# Scheduled EOD pipeline (etl.eod_runner): the "batch complete" signal is read
# from an Elasticsearch CONTROL index populated by the source system, not from
# Kafka. The Kafka consumer above is kept as a fallback/testing path.
# ---------------------------------------------------------------------------

[eod]
# Runtime, mutable state lives under data/state/ (gitignored) — never in config.
state_file = "data/state/eod_state.json"
log_dir = "data/logs"
csv_dir = "data/csv"
# The runner re-checks this many days before --date, so a feed whose End
# arrives late (or a corrected batch) is picked up on a later cron run. A past
# date still missing its End batch is reported as a MISSING warning.
lookback_days = 3

# One [[feeds]] entry per feed. All ES field paths are per-feed configuration —
# real control indices differ from the sample Avro schema (control.action /
# control.eodDate vs control.batch.processStatus), so nothing is hardcoded.
[[feeds]]
name = "facility"
# Query the ALIAS, not the versioned -r1 index behind it.
control_index = "ist.enterprise.c360.facility.eod.control.v1"
data_index = "ist.enterprise.c360.facility.eod.data.v1"
# Fields used to find the day's completed batch in the control index. These are
# used in term queries (filter context), so they must resolve to keyword/date
# fields — append .keyword if the field is mapped as text with a subfield.
action_field = "control.action"
action_value = "End"
date_field = "control.eodDate"
# Dotted JSON path of the join key inside the control document _source.
batch_id_field = "header.batchId"
# Optional: expected record count in the control doc; when present the runner
# asserts the extracted record_count matches before marking the step done.
batch_size_field = "control.batchSizeIntended"
# Field the batchId is matched against in the DATA index (keyword subfield).
data_term_field = "header.batchId.keyword"
# Per-feed transform command; the runner appends <input.jsonl> <output.csv>.
transform = ["python", "src/json_transform/transform_facility_to_csv.py"]
