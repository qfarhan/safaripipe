[pipeline]
environment = "local"

[kafka]
topic = "control-topic"
value_schema_file = "samples/control_message.avsc"

# Shared connection + security properties (literal confluent-kafka / librdkafka names).
[kafka.client]
"bootstrap.servers" = "localhost:9092"
"client.id" = "etl-control-local"
"security.protocol" = "PLAINTEXT"

# Consumer-only librdkafka properties (merged onto [kafka.client]).
[kafka.consumer]
"group.id" = "etl-local"
"auto.offset.reset" = "earliest"
"enable.auto.commit" = true

[schema_registry]
"url" = "http://localhost:8081"

[consumer]
output_dir = "data/converted"
trigger_next = true
next_command = ["python", "-m", "etl.es_lookup"]
max_messages = 100
poll_timeout_seconds = 10.0

[message]
# id_attribute is a dotted path; header.batchId is promoted to id_value and used
# as the Elasticsearch term-query field by etl.es_lookup.
id_attribute = "header.batchId"
# Save-gate: the consumer only converts/saves a message when this dotted-path
# field equals status_value. Leave status_field empty ("") to disable the gate.
status_field = "control.batch.processStatus"
status_value = "End"

[elasticsearch]
hosts = ["http://localhost:9200"]
index = "source-index"
request_timeout_seconds = 30
verify_certs = false
username = ""
password = ""
api_key = ""
