[pipeline]
environment = "local"

[kafka]
# Single topic. To drain several sources in one EOD run, replace `topic` with a
# list, e.g. topics = ["control-topic", "c360-control", "orders-control"]; a list
# takes precedence and one consumer group reads all of them.
topic = "control-topic"
value_schema_file = "samples/control_message.avsc"

# Shared connection + security properties (literal confluent-kafka / librdkafka names).
[kafka.client]
"bootstrap.servers" = "localhost:9092"
"client.id" = "etl-control-local"
"security.protocol" = "PLAINTEXT"

# Consumer-only librdkafka properties (merged onto [kafka.client]).
[kafka.consumer]
"group.id" = "etl-local"
"auto.offset.reset" = "earliest"
"enable.auto.commit" = true

[schema_registry]
"url" = "http://localhost:8081"

[consumer]
output_dir = "data/converted"
trigger_next = true
next_command = ["python", "-m", "etl.es_lookup"]
max_messages = 100
poll_timeout_seconds = 10.0

[message]
# id_attribute is a dotted path; header.batchId is promoted to id_value and used
# as the Elasticsearch term-query field by etl.es_lookup.
id_attribute = "header.batchId"
# Save-gate: the consumer only converts/saves a message when this dotted-path
# field equals status_value. Leave status_field empty ("") to disable the gate.
status_field = "control.batch.processStatus"
status_value = "End"

[elasticsearch]
hosts = ["http://localhost:9200"]
index = "source-index"
# Field the id value is matched against in a term query. Defaults to id_attribute
# (header.batchId) when unset, which is correct when batchId is mapped as keyword.
# If batchId is mapped as `text` with a keyword subfield, set the subfield here:
# term_field = "header.batchId.keyword"
request_timeout_seconds = 30
verify_certs = false
username = ""
password = ""
api_key = ""
# A batch can match thousands of records, so es_lookup scrolls through every
# hit and writes them as JSON-lines to output_dir/<index>-<id_value>.jsonl
# instead of printing them. Tune scroll_size/scroll_timeout for large batches.
output_dir = "data/es_results"
scroll_size = 1000
scroll_timeout = "2m"
