// JAAS for Kafka CLI clients (kafka-console-producer/consumer) running GSSAPI.
// Krb5LoginModule with useKeyTab obtains the TGT straight from the keytab,
// so no separate `kinit` is required.
KafkaClient {
    com.sun.security.auth.module.Krb5LoginModule required
    useKeyTab=true
    storeKey=true
    keyTab="/etc/kafka/keytabs/client.keytab"
    principal="client@EXAMPLE.COM";
};
