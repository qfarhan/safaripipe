# Kerberos client config for processes running ON THE HOST (your machine),
# e.g. the Python consumer/producer talking to the Dockerized KDC.
#
# Differs from krb5.conf (the in-container config) in exactly one way: the KDC
# is reached via the published port on localhost instead of the compose-network
# hostname "kdc". Use it by exporting KRB5_CONFIG before running the client:
#
#   export KRB5_CONFIG="$PWD/kerberos/krb5-host.conf"
[libdefaults]
    default_realm = EXAMPLE.COM
    dns_lookup_realm = false
    dns_lookup_kdc = false
    ticket_lifetime = 24h
    renew_lifetime = 7d
    forwardable = true
    rdns = false
    # Force TCP; the KDC publishes 88/tcp and UDP datagrams can be dropped.
    udp_preference_limit = 1

[realms]
    EXAMPLE.COM = {
        kdc = localhost:88
        admin_server = localhost:88
    }

[domain_realm]
    # The broker advertises "localhost", so map it (and subdomains) to the realm.
    .localhost = EXAMPLE.COM
    localhost = EXAMPLE.COM
