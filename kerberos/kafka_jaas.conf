// Static JAAS for the Kafka broker. The KafkaServer entry is used by the
// SASL_PLAINTEXT/GSSAPI listener to log in as the broker's service principal.
// The keytab arrives via the shared "kerberos-keytabs" volume.
KafkaServer {
    com.sun.security.auth.module.Krb5LoginModule required
    useKeyTab=true
    storeKey=true
    keyTab="/etc/kafka/keytabs/kafka.keytab"
    principal="kafka/localhost@EXAMPLE.COM";
};
