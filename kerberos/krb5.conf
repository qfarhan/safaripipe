# Shared Kerberos client config for the KDC, the Kafka broker, and CLI clients.
# Realm EXAMPLE.COM, single KDC reachable at host "kdc" on the compose network.
[logging]
    default = FILE:/var/log/krb5libs.log
    kdc = FILE:/var/log/krb5kdc.log
    admin_server = FILE:/var/log/kadmind.log

[libdefaults]
    default_realm = EXAMPLE.COM
    dns_lookup_realm = false
    dns_lookup_kdc = false
    ticket_lifetime = 24h
    renew_lifetime = 7d
    forwardable = true
    rdns = false
    # Force TCP; UDP datagrams can be dropped/fragmented inside container networks.
    udp_preference_limit = 1
    default_ccache_name = /tmp/krb5cc_%{uid}

[realms]
    EXAMPLE.COM = {
        kdc = kdc
        admin_server = kdc
    }

[domain_realm]
    # The broker advertises "localhost", so map it (and subdomains) to the realm.
    .localhost = EXAMPLE.COM
    localhost = EXAMPLE.COM
